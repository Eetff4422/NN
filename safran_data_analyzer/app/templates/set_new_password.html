<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-3 border-success">
                <div class="card-body p-5">
                    <h4 class="text-success fw-bold text-center mb-4">Identité confirmée</h4>
                    <p class="text-muted text-center mb-4">Vous pouvez maintenant définir votre nouveau mot de passe.</p>

                    <form method="POST" action="/set_new_password">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Nouveau mot de passe</label>
                            <input type="password" name="new_password" class="form-control form-control-lg" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">Mettre à jour</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
