<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vérification de sécurité</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-3">
                <div class="card-body p-5">
                    <h4 class="text-primary fw-bold text-center mb-4">Vérification d'identité</h4>
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label text-muted">Votre question secrète :</label>
                            <h5 class="fw-bold text-dark mb-3">"{{ question }}"</h5>
                            
                            <label class="form-label fw-bold">Votre réponse :</label>
                            <input type="text" name="secret_answer" class="form-control form-control-lg" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Valider la réponse</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
